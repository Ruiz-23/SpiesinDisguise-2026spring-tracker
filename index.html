<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spies in Disguise · 每周复习追踪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #efefec;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --rocket: #1a6ef5;
    --cheetah: #d97b10;
    --sloth: #5a9e4e;
    --champ: #f5a623;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c;
      --bg-secondary: #2a2a27;
      --bg-tertiary: #141412;
      --text-primary: #f0ede8;
      --text-secondary: #9a9893;
      --border: rgba(255,255,255,0.10);
      --border-md: rgba(255,255,255,0.20);
    }
  }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding-bottom: 3rem;
  }

  .app { max-width: 960px; margin: 0 auto; padding: 1rem 1rem 2rem; }

  /* ── Header ── */
  .header { text-align: center; padding: 1.8rem 0 1rem; }
  .header h1 {
    font-family: 'Orbitron', monospace;
    font-size: 22px; font-weight: 700;
    letter-spacing: 3px; color: var(--text-primary);
  }
  .header p { font-size: 12px; color: var(--text-secondary); margin-top: 6px; letter-spacing: 1px; }

  /* ── Week bar ── */
  .week-bar {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    margin-bottom: 1rem; padding: 10px 16px;
    background: var(--bg-primary); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
  }
  .week-label { font-family: 'Orbitron', monospace; font-size: 13px; color: var(--text-secondary); }
  .week-nav { display: flex; gap: 6px; align-items: center; }
  .week-nav button {
    border: 0.5px solid var(--border); background: transparent;
    border-radius: var(--radius-md); padding: 5px 13px; font-size: 13px;
    cursor: pointer; color: var(--text-primary); transition: background .15s;
  }
  .week-nav button:hover { background: var(--bg-secondary); }
  .admin-btn {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; padding: 5px 11px;
    border-radius: var(--radius-md); border: 0.5px solid var(--border);
    background: transparent; cursor: pointer;
    color: var(--text-secondary); font-family: 'Noto Sans SC', sans-serif;
    transition: all .15s; white-space: nowrap;
  }
  .admin-btn:hover { background: var(--bg-secondary); }
  .admin-btn.active { border-color: var(--rocket); color: var(--rocket); background: #e8f0fe; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 2px; border-bottom: 0.5px solid var(--border); margin-bottom: 1rem; }
  .tab {
    padding: 9px 18px; font-size: 13px; cursor: pointer;
    color: var(--text-secondary); border-bottom: 2px solid transparent;
    margin-bottom: -0.5px; transition: color .15s;
    display: flex; align-items: center; gap: 5px;
  }
  .tab.active { color: var(--text-primary); border-bottom-color: var(--rocket); font-weight: 500; }
  .tab:hover { color: var(--text-primary); }
  .tab-lock { font-size: 11px; opacity: .5; }

  .section { display: none; }
  .section.active { display: block; }

  /* ── Board ── */
  .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-bottom: 1rem; }
  .metric-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 13px 16px; }
  .metric-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .metric-val { font-size: 22px; font-weight: 500; font-family: 'Orbitron', monospace; color: var(--text-primary); }

  .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); gap: 10px; }

  /* ── Student card ── */
  .s-card {
    background: var(--bg-primary); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 12px 14px;
    display: flex; flex-direction: column; gap: 9px;
    transition: border-color .2s, transform .15s;
  }
  .s-card:hover { border-color: var(--border-md); transform: translateY(-1px); }
  .s-card.champ { border-color: var(--champ); border-width: 1.5px; }
  .s-card-top { display: flex; align-items: center; gap: 12px; }

  /* ── Animated icons ── */
  .icon-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .anim-icon { font-size: 30px; display: block; line-height: 1; }
  .rocket-anim  { animation: rocketFly   1.4s ease-in-out infinite alternate; }
  .cheetah-anim { animation: cheetahRun   .5s ease-in-out infinite alternate; }
  .sloth-anim   { animation: slothSway   2.8s ease-in-out infinite alternate; }
  .trophy-anim  { animation: trophyBounce .8s ease-in-out infinite alternate; }
  @keyframes rocketFly    { from { transform: translateY(3px)  rotate(-8deg);  } to { transform: translateY(-6px) rotate(-16deg); } }
  @keyframes cheetahRun   { from { transform: translateX(-2px) scaleX(1);      } to { transform: translateX(4px)  scaleX(1.05);   } }
  @keyframes slothSway    { from { transform: rotate(-6deg) translateY(0);      } to { transform: rotate(6deg)  translateY(4px);  } }
  @keyframes trophyBounce { from { transform: translateY(0)   scale(1);         } to { transform: translateY(-6px) scale(1.1);    } }
  .speed-trail { position: absolute; right: -5px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 3px; animation: trailFade 1.4s ease-in-out infinite alternate; }
  @keyframes trailFade { from { opacity: 0; } to { opacity: .55; } }
  .trail-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--rocket); }
  .cheetah-lines { position: absolute; left: -6px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 4px; animation: lineFlash .5s ease-in-out infinite alternate; }
  @keyframes lineFlash { from { opacity: 0; } to { opacity: .5; } }
  .speed-line { height: 1.5px; background: var(--cheetah); border-radius: 1px; }

  .s-info { flex: 1; min-width: 0; }
  .s-name { font-size: 14px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .s-stats { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
  .s-bar-wrap { height: 4px; border-radius: 2px; background: var(--border); margin-top: 7px; overflow: hidden; }
  .s-bar-fill { height: 100%; border-radius: 2px; transition: width .7s cubic-bezier(.4,0,.2,1); }

  /* ── Audio section ── */
  .audio-section { border-top: 0.5px solid var(--border); padding-top: 9px; display: flex; flex-direction: column; gap: 7px; }
  .audio-label { font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; font-weight: 500; }
  .audio-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rocket); flex-shrink: 0; }
  .player-row { display: flex; align-items: center; gap: 7px; }
  .play-btn {
    width: 30px; height: 30px; border-radius: 50%;
    border: 0.5px solid var(--border); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; transition: all .15s;
  }
  .play-btn:hover { background: var(--bg-secondary); }
  .play-btn.playing { background: var(--rocket); border-color: var(--rocket); color: #fff; }
  .progress-track {
    flex: 1; height: 5px; background: var(--border);
    border-radius: 3px; overflow: hidden; cursor: pointer; position: relative;
  }
  .progress-fill { height: 100%; background: var(--rocket); border-radius: 3px; width: 0%; transition: width .15s linear; pointer-events: none; }
  .dur-label { font-size: 10px; font-family: 'Orbitron', monospace; color: var(--text-secondary); white-space: nowrap; flex-shrink: 0; min-width: 38px; text-align: right; }
  .file-name { font-size: 10px; color: var(--text-secondary); opacity: .65; }
  .no-audio { font-size: 11px; color: var(--text-secondary); opacity: .55; font-style: italic; }

  /* upload zone — admin only */
  .upload-zone {
    border: 1.5px dashed var(--border); border-radius: var(--radius-md);
    padding: 10px; text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s; position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--rocket); background: #f0f5ff; }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-zone-icon { font-size: 18px; margin-bottom: 3px; pointer-events: none; }
  .upload-zone-txt { font-size: 11px; color: var(--text-secondary); pointer-events: none; line-height: 1.5; }
  .del-audio-btn {
    align-self: flex-start; font-size: 11px; padding: 3px 10px;
    border-radius: var(--radius-md); border: 0.5px solid #e24b4a;
    background: transparent; cursor: pointer; color: #e24b4a;
    white-space: nowrap; transition: background .15s;
  }
  .del-audio-btn:hover { background: #fff0f0; }

  /* ── Log form ── */
  .log-form { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.2rem; margin-bottom: 1rem; }
  .log-form h3 { font-size: 11px; letter-spacing: 1px; margin-bottom: 1rem; color: var(--text-secondary); font-family: 'Orbitron', monospace; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
  .form-group label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  select, input[type=number], input[type=text], input[type=password] {
    width: 100%; padding: 8px 10px; font-size: 14px;
    border: 0.5px solid var(--border); border-radius: var(--radius-md);
    background: var(--bg-primary); color: var(--text-primary);
    font-family: 'Noto Sans SC', sans-serif; outline: none; transition: border-color .15s;
  }
  select:focus, input:focus { border-color: var(--rocket); }
  .btn { border: 0.5px solid var(--border); background: transparent; border-radius: var(--radius-md); padding: 8px 14px; font-size: 13px; cursor: pointer; color: var(--text-primary); transition: background .15s; }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary { background: var(--rocket); color: #fff; border-color: var(--rocket); font-weight: 500; }
  .btn-primary:hover { opacity: .88; }
  .btn-danger { background: #e24b4a; color: #fff; border-color: #e24b4a; font-weight: 500; }
  .btn-danger:hover { opacity: .88; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ── Summary panel ── */
  .stu-summary { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
  .stu-summary-hd { padding: 10px 14px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .stu-summary-hd-left { font-size: 11px; letter-spacing: .8px; color: var(--text-secondary); font-family: 'Orbitron', monospace; }
  .stat-strip { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; padding: 12px 14px; border-bottom: 0.5px solid var(--border); }
  .stat-box { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 12px; text-align: center; }
  .stat-box-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; line-height: 1.3; }
  .stat-box-val { font-size: 18px; font-weight: 500; font-family: 'Orbitron', monospace; color: var(--text-primary); }
  .stat-box-unit { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .stat-box.highlight .stat-box-val { color: var(--rocket); }

  /* ── Log list ── */
  .log-list { max-height: 320px; overflow-y: auto; }
  .log-item { display: flex; align-items: center; padding: 9px 14px; border-bottom: 0.5px solid var(--border); gap: 10px; font-size: 13px; }
  .log-item:last-child { border-bottom: none; }
  .days-badge { font-size: 11px; font-family: 'Orbitron', monospace; background: var(--bg-secondary); border-radius: var(--radius-md); padding: 2px 8px; color: var(--text-secondary); flex-shrink: 0; }
  .log-del { cursor: pointer; color: var(--text-secondary); font-size: 17px; padding: 0 4px; opacity: .35; flex-shrink: 0; margin-left: auto; transition: opacity .15s, color .15s; }
  .log-del:hover { opacity: 1; color: #e24b4a; }
  .empty { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 13px; }

  /* ── Chart ── */
  .chart-wrap { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem; margin-bottom: 1rem; }
  .chart-title { font-size: 11px; letter-spacing: .8px; color: var(--text-secondary); margin-bottom: 1rem; font-family: 'Orbitron', monospace; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-nm { width: 90px; font-size: 12px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 22px; background: var(--bg-secondary); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: 7px; font-size: 11px; font-weight: 500; color: #fff; transition: width .7s cubic-bezier(.4,0,.2,1); }
  .bar-v { font-size: 11px; color: var(--text-secondary); width: 44px; text-align: right; font-family: 'Orbitron', monospace; flex-shrink: 0; }

  /* ── Roster ── */
  .roster-panel { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
  .roster-hd { padding: 10px 14px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .roster-hd-title { font-size: 11px; letter-spacing: .8px; color: var(--text-secondary); font-family: 'Orbitron', monospace; }
  .roster-list { padding: 8px 0; }
  .roster-row { display: flex; align-items: center; gap: 8px; padding: 5px 14px; }
  .roster-num { font-size: 12px; font-family: 'Orbitron', monospace; color: var(--text-secondary); width: 22px; flex-shrink: 0; text-align: right; }
  .roster-input { flex: 1; padding: 6px 10px; font-size: 14px; }
  .roster-save-btn { padding: 5px 10px; font-size: 12px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: transparent; color: var(--rocket); cursor: pointer; white-space: nowrap; transition: background .15s; }
  .roster-save-btn:hover { background: var(--bg-secondary); }
  .roster-add { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-top: 0.5px solid var(--border); margin-top: 4px; }

  /* ── Locked overlay ── */
  .locked-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; gap: 16px; text-align: center; }
  .locked-icon { font-size: 42px; }
  .locked-msg { font-size: 14px; color: var(--text-secondary); line-height: 1.8; }
  .pw-row { display: flex; gap: 8px; width: 100%; max-width: 300px; }
  .pw-row input { flex: 1; }
  .pw-err { font-size: 12px; color: #e24b4a; min-height: 18px; }

  /* ── Modal ── */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .modal-bg.show { opacity: 1; pointer-events: auto; }
  .modal { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.6rem; width: 300px; display: flex; flex-direction: column; gap: 12px; }
  .modal h3 { font-size: 15px; font-weight: 500; color: var(--text-primary); }
  .modal p { font-size: 13px; color: var(--text-secondary); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--rocket); color: #fff; padding: 10px 18px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }

  /* ── Responsive ── */
  @media (max-width: 580px) {
    .form-row { grid-template-columns: 1fr 1fr; }
    .student-grid { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 360px) { .student-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>SPIES IN DISGUISE</h1>
    <p>每周复习打卡追踪系统</p>
  </div>

  <div class="week-bar">
    <span class="week-label" id="weekLabel">第 1 周</span>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">&#9664;</button>
      <button onclick="changeWeek(1)">&#9654;</button>
      <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">
        <span id="lockIcon">🔒</span>
        <span id="adminLabel">管理员</span>
      </button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('board',this)">打卡墙</div>
    <div class="tab" onclick="switchTab('log',this)">记录复习</div>
    <div class="tab" onclick="switchTab('chart',this)">对比图</div>
    <div class="tab" id="rosterTab" onclick="handleRosterTab(this)">
      学生名单 <span class="tab-lock" id="rosterLockIcon">🔒</span>
    </div>
  </div>

  <!-- BOARD -->
  <div id="board" class="section active">
    <div class="grid-2">
      <div class="metric-card">
        <div class="metric-label">本周累计分钟</div>
        <div class="metric-val" id="m-total">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">平均复习天数</div>
        <div class="metric-val" id="m-days">0.0</div>
      </div>
    </div>
    <div class="student-grid" id="studentGrid"></div>
  </div>

  <!-- LOG -->
  <div id="log" class="section">
    <div class="log-form">
      <h3>记录复习时间</h3>
      <div class="form-row">
        <div class="form-group">
          <label>学生姓名</label>
          <select id="selStudent"></select>
        </div>
        <div class="form-group">
          <label>复习总时长（分钟）</label>
          <input type="number" id="inpMinutes" min="1" max="9999" placeholder="如：120">
        </div>
        <div class="form-group">
          <label>总天数（1–7）</label>
          <input type="number" id="inpDays" min="1" max="7" placeholder="1–7">
        </div>
        <button class="btn btn-primary" onclick="logReview()" style="height:38px">+ 记录</button>
      </div>
    </div>

    <div class="stu-summary">
      <div class="stu-summary-hd">
        <span class="stu-summary-hd-left">本周详情</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--text-secondary)">查看：</span>
          <select id="filterStudent" onchange="renderLogs()" style="font-size:12px;padding:4px 8px;width:auto">
            <option value="all">全班汇总</option>
          </select>
        </div>
      </div>
      <div class="stat-strip">
        <div class="stat-box">
          <div class="stat-box-label">累计复习时间</div>
          <div class="stat-box-val" id="ss-minutes">0</div>
          <div class="stat-box-unit">分钟</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">累计复习天数</div>
          <div class="stat-box-val" id="ss-days">0</div>
          <div class="stat-box-unit">天</div>
        </div>
        <div class="stat-box highlight">
          <div class="stat-box-label">日均复习时间</div>
          <div class="stat-box-val" id="ss-avg">—</div>
          <div class="stat-box-unit">分钟/天</div>
        </div>
      </div>
      <div id="logList" class="log-list"></div>
    </div>
  </div>

  <!-- CHART -->
  <div id="chart" class="section">
    <div class="chart-wrap">
      <div class="chart-title">复习分钟数对比</div>
      <div id="barChart"></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">复习天数对比</div>
      <div id="daysChart"></div>
    </div>
  </div>

  <!-- ROSTER -->
  <div id="roster" class="section">
    <div class="roster-panel"><div id="rosterInner"></div></div>
    <p id="rosterHint" style="font-size:12px;color:var(--text-secondary);text-align:center;padding-bottom:.5rem;display:none">
      修改姓名后点击「保存」，删除学生将同时删除其所有记录
    </p>
  </div>
</div>

<!-- Password modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>🔐 管理员验证</h3>
    <p>请输入管理员密码以进入编辑模式</p>
    <input type="password" id="pwInput" placeholder="输入密码"
           onkeydown="if(event.key==='Enter')submitPw()">
    <div class="pw-err" id="pwErr"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitPw()">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════
   ★  CHANGE THIS TO YOUR OWN PASSWORD  ★
   ═══════════════════════════════════════ */
const ADMIN_PASSWORD = 'henryspies2026';
/* ═══════════════════════════════════════ */

const STORAGE_KEY = 'sid_v13';
const AUDIO_KEY   = 'sid_v13_audio';

const DEFAULT_STUDENTS = [
  '欧阳逸忱','李思斓','李明泽','于泓念','白安晴',
  '陈奕昕(仔仔)','叶元培','孙沐泽','朱语桐','赵希豪',
  '王可为','何禹墨','代景月','姬蕴航'
];
const COLORS = { rocket:'#1a6ef5', cheetah:'#d97b10', sloth:'#5a9e4e', champ:'#f5a623' };

/* isAdmin is session-only — always false on page load */
let isAdmin    = false;
let state      = { week: 1, logs: [], students: [...DEFAULT_STUDENTS] };
let audioStore = {}; /* "name__wN" → { dataUrl, duration, fileName } */

/* single shared Audio element for playback */
let currentAudio = null, currentPlayKey = null;

/* ── Storage ── */
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

function saveAudio() {
  try {
    localStorage.setItem(AUDIO_KEY, JSON.stringify(audioStore));
  } catch(e) {
    showToast('⚠️ 存储空间不足，请删除旧音频后重试');
  }
}

function load() {
  /* clean up old storage keys */
  ['sid_v4','sid_v8','sid_v9','sid_v10','sid_v11','sid_v12'].forEach(k => {
    try { localStorage.removeItem(k); } catch(e) {}
  });
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) {
      const p = JSON.parse(d);
      state = { ...state, ...p };
      if (!state.students?.length) state.students = [...DEFAULT_STUDENTS];
    }
  } catch(e) {}
  try {
    const a = localStorage.getItem(AUDIO_KEY);
    if (a) audioStore = JSON.parse(a);
  } catch(e) {}
}

/* ── Helpers ── */
function aKey(name, week) { return name + '__w' + week; }

function fmtDur(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.round(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

/* ── Audio upload (admin only) ── */
function handleUpload(name, week, input) {
  const file = input.files[0];
  if (!file) return;
  if (!file.type.startsWith('audio/')) { showToast('请上传音频文件（mp3、m4a、wav 等）'); input.value = ''; return; }
  if (file.size > 10 * 1024 * 1024) { showToast('文件不能超过 10 MB'); input.value = ''; return; }

  const reader = new FileReader();
  reader.onload = () => {
    const key = aKey(name, week);
    const tmp = new Audio(reader.result);
    const store = () => {
      audioStore[key] = { dataUrl: reader.result, duration: tmp.duration || 0, fileName: file.name };
      saveAudio();
      renderBoard();
      showToast('✓ 已上传：' + file.name);
    };
    tmp.onloadedmetadata = store;
    tmp.onerror = store; /* store even if metadata fails */
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function deleteAudio(key) {
  if (!confirm('确定删除这段语音点评吗？')) return;
  if (currentPlayKey === key) { currentAudio?.pause(); currentAudio = null; currentPlayKey = null; }
  delete audioStore[key];
  saveAudio();
  renderBoard();
  showToast('已删除');
}

/* ── Playback ── */
function togglePlay(key) {
  if (currentPlayKey === key && currentAudio) {
    currentAudio.paused ? currentAudio.play() : currentAudio.pause();
    updateAllPlayers(); return;
  }
  currentAudio?.pause();
  const rec = audioStore[key]; if (!rec) return;
  currentPlayKey = key;
  currentAudio = new Audio(rec.dataUrl);
  currentAudio.ontimeupdate = updateAllPlayers;
  currentAudio.onended = () => { currentPlayKey = null; currentAudio = null; updateAllPlayers(); };
  currentAudio.onerror = () => { showToast('无法播放此音频'); currentPlayKey = null; currentAudio = null; updateAllPlayers(); };
  currentAudio.play();
  updateAllPlayers();
}

function seekAudio(key, e, el) {
  if (currentPlayKey !== key || !currentAudio) return;
  const r = el.getBoundingClientRect();
  currentAudio.currentTime = (e.clientX - r.left) / r.width * currentAudio.duration;
}

function updateAllPlayers() {
  document.querySelectorAll('.player-row[data-akey]').forEach(row => {
    const key = row.dataset.akey;
    const isActive  = currentPlayKey === key;
    const isPlaying = isActive && currentAudio && !currentAudio.paused;
    const pb   = row.querySelector('.play-btn');
    const fill = row.querySelector('.progress-fill');
    const dur  = row.querySelector('.dur-label');
    if (pb)   { pb.textContent = isPlaying ? '⏸' : '▶'; pb.classList.toggle('playing', isPlaying); }
    if (fill) {
      if (isActive && currentAudio?.duration)
        fill.style.width = (currentAudio.currentTime / currentAudio.duration * 100) + '%';
      else if (!isActive) fill.style.width = '0%';
    }
    if (dur) {
      const rec = audioStore[key];
      if (isActive && currentAudio?.duration)
        dur.textContent = fmtDur(currentAudio.currentTime) + ' / ' + fmtDur(currentAudio.duration);
      else dur.textContent = rec ? fmtDur(rec.duration) : '';
    }
  });
}

/* ── Data ── */
function getSummary(w) {
  const logs = state.logs.filter(l => l.week === w);
  const map  = {};
  state.students.forEach(s => { map[s] = { minutes: 0, days: 0 }; });
  logs.forEach(l => { if (map[l.student] !== undefined) { map[l.student].minutes = l.minutes; map[l.student].days = l.days; } });
  return state.students.map(s => ({ name: s, minutes: map[s].minutes, days: map[s].days }))
    .sort((a, b) => b.minutes - a.minutes || b.days - a.days);
}

function getTier(rank, total) {
  const top = Math.ceil(total / 3), mid = Math.ceil(2 * total / 3);
  if (rank === 1)   return 'champ';
  if (rank <= top)  return 'rocket';
  if (rank <= mid)  return 'cheetah';
  return 'sloth';
}

function tierIcon(tier, minutes) {
  if (tier === 'champ'   && minutes > 0) return { char: '🏆', anim: 'trophy-anim'  };
  if (tier === 'rocket')                 return { char: '🚀', anim: 'rocket-anim'  };
  if (tier === 'cheetah')                return { char: '🐆', anim: 'cheetah-anim' };
  return                                        { char: '🦥', anim: 'sloth-anim'   };
}

function extraDecor(tier) {
  if (tier === 'rocket')  return `<div class="speed-trail"><div class="trail-dot"></div><div class="trail-dot"></div><div class="trail-dot"></div></div>`;
  if (tier === 'cheetah') return `<div class="cheetah-lines"><div class="speed-line" style="width:10px"></div><div class="speed-line" style="width:7px"></div><div class="speed-line" style="width:5px"></div></div>`;
  return '';
}

/* ── Render board ── */
function renderBoard() {
  const data   = getSummary(state.week);
  const n      = state.students.length || 1;
  const maxMin = Math.max(1, ...data.map(d => d.minutes));
  document.getElementById('m-total').textContent = data.reduce((a, b) => a + b.minutes, 0);
  document.getElementById('m-days').textContent  = (data.reduce((a, b) => a + b.days, 0) / n).toFixed(1);

  document.getElementById('studentGrid').innerHTML = data.map((s, i) => {
    const tier    = getTier(i + 1, n);
    const ico     = tierIcon(tier, s.minutes);
    const isChamp = tier === 'champ' && s.minutes > 0;
    const color   = isChamp ? COLORS.champ : (COLORS[tier] || COLORS.sloth);
    const pct     = Math.round(s.minutes / maxMin * 100);
    const key     = aKey(s.name, state.week);
    const rec     = audioStore[key];

    /* escape for use inside HTML attribute strings */
    const safeKey  = key.replace(/'/g, "\\'");
    const safeName = s.name.replace(/'/g, "\\'");

    /* player — visible to everyone when audio exists */
    let playerHtml = '';
    if (rec) {
      playerHtml = `
        <div class="audio-label"><div class="audio-dot"></div>本周语音点评</div>
        <div class="player-row" data-akey="${key}">
          <button class="play-btn" onclick="togglePlay('${safeKey}')">▶</button>
          <div class="progress-track" onclick="seekAudio('${safeKey}',event,this)">
            <div class="progress-fill"></div>
          </div>
          <span class="dur-label">${fmtDur(rec.duration)}</span>
        </div>
        <div class="file-name">📎 ${rec.fileName || 'audio'}</div>`;
    } else if (!isAdmin) {
      playerHtml = `<div class="no-audio">暂无语音点评</div>`;
    }

    /* upload zone — admin only */
    let uploadHtml = '';
    if (isAdmin) {
      uploadHtml = `
        <div class="upload-zone"
             title="点击或拖拽上传音频"
             ondragover="event.preventDefault();this.classList.add('dragover')"
             ondragleave="this.classList.remove('dragover')"
             ondrop="this.classList.remove('dragover');handleUpload('${safeName}',${state.week},this.querySelector('input'))">
          <div class="upload-zone-icon">🎵</div>
          <div class="upload-zone-txt">${rec ? '点击替换音频' : '点击上传语音点评'}<br><span style="opacity:.6">mp3 / m4a / wav · 最大 10 MB</span></div>
          <input type="file" accept="audio/*" onchange="handleUpload('${safeName}',${state.week},this)">
        </div>
        ${rec ? `<button class="del-audio-btn" onclick="deleteAudio('${safeKey}')">删除音频</button>` : ''}`;
    }

    return `<div class="s-card${isChamp ? ' champ' : ''}">
      <div class="s-card-top">
        <div class="icon-wrap">
          <span class="anim-icon ${ico.anim}">${ico.char}</span>
          ${extraDecor(isChamp ? 'champ' : tier)}
        </div>
        <div class="s-info">
          <div class="s-name">${s.name}</div>
          <div class="s-stats">${s.minutes} 分钟 · ${s.days} 天</div>
          <div class="s-bar-wrap"><div class="s-bar-fill" style="width:${s.minutes ? Math.max(pct, 4) : 0}%;background:${color}"></div></div>
        </div>
      </div>
      <div class="audio-section">
        ${playerHtml}
        ${uploadHtml}
      </div>
    </div>`;
  }).join('');
}

/* ── Render logs ── */
function renderLogs() {
  const filter   = document.getElementById('filterStudent').value;
  const weekLogs = state.logs.filter(l => l.week === state.week);
  const filtered = filter === 'all' ? weekLogs : weekLogs.filter(l => l.student === filter);
  const tot  = filtered.reduce((a, b) => a + b.minutes, 0);
  const days = filtered.reduce((a, b) => a + b.days, 0);
  document.getElementById('ss-minutes').textContent = tot;
  document.getElementById('ss-days').textContent    = days;
  document.getElementById('ss-avg').textContent     = days > 0 ? (tot / days).toFixed(1) : '—';

  const sorted = [...filtered].sort((a, b) => b.minutes - a.minutes);
  const el = document.getElementById('logList');
  if (!sorted.length) { el.innerHTML = '<div class="empty">本周暂无记录</div>'; return; }
  el.innerHTML = sorted.map(l => `<div class="log-item">
    <span class="days-badge">共${l.days}天</span>
    <span style="font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.student}</span>
    <span style="font-family:'Orbitron',monospace;font-size:12px;flex-shrink:0">${l.minutes}<span style="font-size:10px;color:var(--text-secondary);margin-left:2px">分钟</span></span>
    <span class="log-del" onclick="deleteLog('${l.id}')">&#215;</span>
  </div>`).join('');
}

/* ── Render chart ── */
function renderChart() {
  const data    = getSummary(state.week);
  const n       = state.students.length || 1;
  const maxMin  = Math.max(1, ...data.map(d => d.minutes));
  const maxDays = Math.max(1, ...data.map(d => d.days));

  document.getElementById('barChart').innerHTML = data.map((s, i) => {
    const tier = getTier(i+1,n), ico = tierIcon(tier,s.minutes), isC = tier==='champ'&&s.minutes>0;
    const col = isC ? COLORS.champ : (COLORS[tier]||COLORS.sloth);
    const p = maxMin > 0 ? Math.round(s.minutes/maxMin*100) : 0;
    return `<div class="bar-row"><div class="bar-nm">${ico.char} ${s.name}</div><div class="bar-track"><div class="bar-fill" style="width:${s.minutes?Math.max(p,2):0}%;background:${col}">${s.minutes>10?s.minutes:''}</div></div><div class="bar-v">${s.minutes}m</div></div>`;
  }).join('');

  document.getElementById('daysChart').innerHTML = data.map((s, i) => {
    const tier = getTier(i+1,n), ico = tierIcon(tier,s.minutes), isC = tier==='champ'&&s.minutes>0;
    const col = isC ? COLORS.champ : (COLORS[tier]||COLORS.sloth);
    const p = maxDays > 0 ? Math.round(s.days/maxDays*100) : 0;
    return `<div class="bar-row"><div class="bar-nm">${ico.char} ${s.name}</div><div class="bar-track"><div class="bar-fill" style="width:${s.days?Math.max(p,6):0}%;background:${col}">${s.days>0?s.days+'天':''}</div></div><div class="bar-v">${s.days}天</div></div>`;
  }).join('');
}

/* ── Render roster ── */
function renderRoster() {
  const hint = document.getElementById('rosterHint');
  if (!isAdmin) {
    document.getElementById('rosterInner').innerHTML = `
      <div class="locked-overlay">
        <div class="locked-icon">🔒</div>
        <div class="locked-msg">此页面仅管理员可编辑<br>请输入密码登录</div>
        <div class="pw-row">
          <input type="password" id="inlinepw" placeholder="输入密码" onkeydown="if(event.key==='Enter')inlineLogin()">
          <button class="btn btn-primary btn-sm" onclick="inlineLogin()">登录</button>
        </div>
        <div class="pw-err" id="inlinePwErr"></div>
      </div>`;
    hint.style.display = 'none'; return;
  }
  hint.style.display = 'block';
  document.getElementById('rosterInner').innerHTML = `
    <div class="roster-hd">
      <span class="roster-hd-title">学生名单管理</span>
      <span style="font-size:12px;color:var(--text-secondary)">共 ${state.students.length} 名学生</span>
    </div>
    <div class="roster-list">
      ${state.students.map((s, i) => `
        <div class="roster-row">
          <span class="roster-num">${i + 1}</span>
          <input type="text" class="roster-input" value="${s}" id="ri_${i}" onkeydown="if(event.key==='Enter')saveStudent(${i})">
          <button class="roster-save-btn" onclick="saveStudent(${i})">保存</button>
          <button class="btn btn-danger" style="padding:4px 8px;font-size:12px" onclick="removeStudent(${i})">删除</button>
        </div>`).join('')}
    </div>
    <div class="roster-add">
      <input type="text" id="newNameInput" placeholder="输入新学生姓名" style="flex:1">
      <button class="btn btn-primary" onclick="addStudent()" style="white-space:nowrap">+ 添加</button>
    </div>`;
}

/* ── Admin ── */
function toggleAdmin() {
  if (isAdmin) {
    isAdmin = false; updateAdminUI();
    if (document.getElementById('roster').classList.contains('active')) renderRoster();
    renderBoard(); showToast('已退出管理员模式');
  } else { openModal(); }
}
function updateAdminUI() {
  const btn  = document.getElementById('adminBtn');
  const icon = document.getElementById('lockIcon');
  const lbl  = document.getElementById('adminLabel');
  const rl   = document.getElementById('rosterLockIcon');
  if (isAdmin) { btn.classList.add('active'); icon.textContent='🔓'; lbl.textContent='管理中'; rl.style.display='none'; }
  else { btn.classList.remove('active'); icon.textContent='🔒'; lbl.textContent='管理员'; rl.style.display=''; }
}
function openModal() { document.getElementById('modalBg').classList.add('show'); document.getElementById('pwInput').value=''; document.getElementById('pwErr').textContent=''; setTimeout(()=>document.getElementById('pwInput').focus(),120); }
function closeModal() { document.getElementById('modalBg').classList.remove('show'); }
function submitPw() {
  const v = document.getElementById('pwInput').value;
  if (v === ADMIN_PASSWORD) {
    isAdmin = true; closeModal(); updateAdminUI();
    if (document.getElementById('roster').classList.contains('active')) renderRoster();
    renderBoard(); showToast('已进入管理员模式 🔓');
  } else { document.getElementById('pwErr').textContent='密码错误，请重试'; document.getElementById('pwInput').value=''; document.getElementById('pwInput').focus(); }
}
function handleRosterTab(el) { if (!isAdmin) { openModal(); return; } switchTab('roster', el); }
function inlineLogin() {
  const v = document.getElementById('inlinepw').value;
  if (v === ADMIN_PASSWORD) { isAdmin=true; updateAdminUI(); renderRoster(); showToast('已进入管理员模式 🔓'); }
  else { document.getElementById('inlinePwErr').textContent='密码错误，请重试'; document.getElementById('inlinepw').value=''; }
}

/* ── Roster CRUD ── */
function rebuildSelects() {
  const sel=document.getElementById('selStudent'), fsel=document.getElementById('filterStudent');
  const ps=sel.value, pf=fsel.value;
  sel.innerHTML=''; fsel.innerHTML='<option value="all">全班汇总</option>';
  state.students.forEach(s=>{ sel.innerHTML+=`<option>${s}</option>`; fsel.innerHTML+=`<option value="${s}">${s}</option>`; });
  if(state.students.includes(ps)) sel.value=ps;
  if(state.students.includes(pf)) fsel.value=pf;
}
function saveStudent(i) {
  const v=document.getElementById('ri_'+i).value.trim();
  if(!v){showToast('姓名不能为空');return}
  if(state.students.includes(v)&&state.students[i]!==v){showToast('该姓名已存在');return}
  const old=state.students[i]; state.students[i]=v;
  state.logs=state.logs.map(l=>l.student===old?{...l,student:v}:l);
  save(); rebuildSelects(); renderBoard(); renderLogs(); renderChart(); renderRoster(); showToast('已保存 ✓');
}
function removeStudent(i) {
  const name=state.students[i];
  if(!confirm(`确定删除「${name}」及其所有记录吗？`))return;
  state.students.splice(i,1);
  state.logs=state.logs.filter(l=>l.student!==name);
  save(); rebuildSelects(); renderBoard(); renderLogs(); renderChart(); renderRoster(); showToast('已删除');
}
function addStudent() {
  const v=document.getElementById('newNameInput').value.trim();
  if(!v){showToast('请输入姓名');return}
  if(state.students.includes(v)){showToast('该姓名已存在');return}
  state.students.push(v);
  document.getElementById('newNameInput').value='';
  save(); rebuildSelects(); renderBoard(); renderLogs(); renderChart(); renderRoster(); showToast('已添加 ✓');
}

/* ── Log CRUD ── */
function logReview() {
  const student=document.getElementById('selStudent').value;
  const minutes=parseInt(document.getElementById('inpMinutes').value)||0;
  const days=parseInt(document.getElementById('inpDays').value)||0;
  if(!student||minutes<1||days<1||days>7){showToast('请正确填写所有字段');return}
  const existing=state.logs.findIndex(l=>l.week===state.week&&l.student===student);
  const entry={id:Date.now()+'',week:state.week,student,minutes,days};
  if(existing>=0){if(!confirm(`${student} 本周已有记录，是否覆盖？`))return;state.logs[existing]=entry}
  else state.logs.push(entry);
  save(); renderBoard(); renderLogs(); renderChart();
  document.getElementById('inpMinutes').value='';
  document.getElementById('inpDays').value='';
  showToast('记录成功 ✓');
}
function deleteLog(id) { state.logs=state.logs.filter(l=>l.id!==id); save(); renderBoard(); renderLogs(); renderChart(); }

/* ── Navigation ── */
function changeWeek(d) {
  const nw=state.week+d; if(nw<1||nw>52)return;
  state.week=nw;
  document.getElementById('weekLabel').textContent='第 '+state.week+' 周';
  currentAudio?.pause(); currentAudio=null; currentPlayKey=null;
  save(); renderBoard(); renderLogs(); renderChart();
}
function switchTab(id, el) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active'); el.classList.add('active');
  if(id==='chart')renderChart(); if(id==='board')renderBoard();
  if(id==='log')renderLogs(); if(id==='roster')renderRoster();
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── Bootstrap ── */
function init() {
  load();
  rebuildSelects();
  document.getElementById('weekLabel').textContent='第 '+state.week+' 周';
  updateAdminUI();
  renderBoard();
  renderLogs();
}
init();

/* keep playback progress bar smooth */
setInterval(updateAllPlayers, 300);
</script>
</body>
</html>
